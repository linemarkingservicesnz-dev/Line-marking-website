<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 210" width="920" height="210">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E63A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E06000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9AE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5FA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.28" />
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <filter id="iconShadow" x="-15%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1A5FA8" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow" x="-2%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1A5FA8" flood-opacity="0.15"/>
    </filter>
    <filter id="orangeGlow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#FF8C2A" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C2A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="920" height="210" rx="12" fill="#FFFFFF"/>
  <rect x="1" y="1" width="918" height="208" rx="11" fill="none" stroke="#E4EDF7" stroke-width="1.5"/>

  <g filter="url(#iconShadow)">
    <rect x="22" y="22" width="148" height="148" rx="30" fill="url(#iconBg)"/>
  </g>
  <rect x="22" y="22" width="148" height="74" rx="30" fill="url(#gloss)"/>
  <rect x="22" y="72" width="148" height="18" fill="url(#gloss)"/>

  <g filter="url(#iconShadow)">
    <polygon points="52,36  120,96  52,156  74,156  128,96  74,36" fill="#FFFFFF" opacity="0.92"/>
  </g>
  <g filter="url(#orangeGlow)">
    <polygon points="82,50  148,96  82,140  102,140  152,96  102,50" fill="url(#orangeGrad)"/>
  </g>

  <rect x="23.5" y="23.5" width="145" height="145" rx="29" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.25"/>

  <text x="188" y="107" font-family="'Barlow Condensed', 'Arial Narrow', 'Impact', sans-serif" font-size="68" font-weight="800" letter-spacing="1.5" filter="url(#textShadow)">
    <tspan fill="url(#blueGrad)">LINE-MARKING</tspan><tspan fill="url(#orangeGrad)" filter="url(#orangeGlow)">.CO.NZ</tspan>
  </text>

  <rect x="188" y="120" width="706" height="3" rx="1.5" fill="url(#ruleGrad)"/>

  <text x="190" y="168" font-family="'Barlow', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="5" fill="#7A9EC0">PROFESSIONAL LINE MARKING</text>
</svg>
